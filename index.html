<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏄 Beach Boys Track Roulette 🏃</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg,
        #1a6496 0%,
        #2e86c1 20%,
        #1abc9c 55%,
        #148f77 100%
      );
      overflow-x: hidden;
      position: relative;
    }

    /* ─── Sun ─── */
    .sun {
      position: fixed;
      top: -40px;
      right: 100px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, #fff9c4 20%, #ffe082 55%, #ffb300 100%);
      border-radius: 50%;
      box-shadow: 0 0 0 18px rgba(255,236,64,0.18), 0 0 80px 40px rgba(255,214,0,0.35);
      animation: sunPulse 4s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes sunPulse {
      from { box-shadow: 0 0 0 18px rgba(255,236,64,0.18), 0 0 80px 40px rgba(255,214,0,0.3); }
      to   { box-shadow: 0 0 0 28px rgba(255,236,64,0.22), 0 0 110px 60px rgba(255,214,0,0.45); }
    }

    /* ─── Waves ─── */
    .waves {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 130px;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }
    .wave-svg {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 100%;
    }
    .wave-svg:nth-child(1) { animation: waveScroll 7s linear infinite; fill: rgba(255,255,255,0.45); }
    .wave-svg:nth-child(2) { animation: waveScroll 11s linear infinite reverse; fill: rgba(255,255,255,0.25); bottom: 10px; }
    .wave-svg:nth-child(3) { animation: waveScroll 14s linear infinite; fill: rgba(255,255,255,0.15); bottom: 5px; }
    @keyframes waveScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ─── Seagull ─── */
    .seagull {
      position: fixed;
      font-size: 1.6rem;
      z-index: 0;
      pointer-events: none;
      animation: gullFly linear forwards;
    }
    @keyframes gullFly {
      from { transform: translateX(0); }
      to   { transform: translateX(115vw); }
    }

    /* ─── Layout ─── */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 20px 160px;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* ─── Header ─── */
    .logo {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 6vw, 3.8rem);
      color: #fff;
      text-shadow: 3px 4px 0 rgba(0,0,0,0.2), 0 0 40px rgba(255,255,255,0.3);
      margin-bottom: 6px;
      line-height: 1.1;
    }
    .subtitle {
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      color: rgba(255,255,255,0.85);
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ─── Slot Machine ─── */
    .slot-wrapper {
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 24px;
      padding: 16px;
      margin: 0 auto 28px;
      max-width: 660px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .slot-machine {
      height: 140px;
      overflow: hidden;
      border-radius: 14px;
      position: relative;
      background: rgba(0,0,0,0.4);
      border: 2px solid rgba(255,255,255,0.15);
    }

    /* top & bottom fade */
    .slot-machine::before,
    .slot-machine::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 38%;
      z-index: 10;
      pointer-events: none;
    }
    .slot-machine::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }
    .slot-machine::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    }

    /* gold highlight lines at center */
    .slot-highlight {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 0; right: 0;
      height: 72px;
      border-top: 2px solid rgba(255,214,0,0.7);
      border-bottom: 2px solid rgba(255,214,0,0.7);
      z-index: 9;
      pointer-events: none;
    }

    .slot-reel {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .slot-item {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .slot-item .ei { font-size: 1.4em; }

    /* ─── Spin Button ─── */
    .spin-btn {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #ff6b6b 0%, #ff9f43 100%);
      color: #fff;
      border: none;
      padding: 16px 56px;
      font-size: clamp(1rem, 3vw, 1.45rem);
      font-weight: 900;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 6px 24px rgba(255,107,107,0.5), 0 3px 0 #c0392b;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.2s;
      position: relative;
      overflow: hidden;
      user-select: none;
    }
    .spin-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.22), transparent 55%);
      border-radius: 50px;
    }
    .spin-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,107,107,0.6), 0 3px 0 #c0392b;
    }
    .spin-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 12px rgba(255,107,107,0.4), 0 1px 0 #c0392b;
    }
    .spin-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    /* ─── Workout Card ─── */
    .workout-card {
      background: #fff;
      border-radius: 24px;
      padding: clamp(20px, 4vw, 32px);
      margin: 28px auto 0;
      max-width: 660px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.3);
      transform: translateY(50px) scale(0.95);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity  0.4s ease;
      text-align: left;
    }
    .workout-card.show {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 900;
      color: #1a1a2e;
      line-height: 1.15;
    }
    .tag {
      display: inline-block;
      background: #e8f4fc;
      color: #1565c0;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 20px;
      white-space: nowrap;
      border: 1px solid #90caf9;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .card-desc {
      color: #555;
      font-size: 0.95rem;
      line-height: 1.65;
      margin: 12px 0 18px;
    }

    .steps-list {
      list-style: none;
      margin-bottom: 20px;
    }
    .steps-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 14px;
      margin-bottom: 7px;
      background: #f0f9ff;
      border-radius: 12px;
      border-left: 4px solid #2e86c1;
      font-size: 0.92rem;
      color: #1a1a2e;
      line-height: 1.45;
    }
    .step-num {
      background: #2e86c1;
      color: #fff;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.78rem;
      flex-shrink: 0;
    }

    .card-footer {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #fffde7;
      border: 1px solid #f9a825;
      color: #6d4c00;
      padding: 7px 13px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
    }

    /* ─── History ─── */
    .history {
      margin-top: 18px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.65);
      font-weight: 700;
      min-height: 22px;
      letter-spacing: 0.3px;
    }

    /* ─── Confetti ─── */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      overflow: hidden;
    }
    .cp {
      position: absolute;
      border-radius: 2px;
      animation: cfFall linear forwards;
    }
    @keyframes cfFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    /* ─── Screen flash on reveal ─── */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      pointer-events: none;
      z-index: 199;
      opacity: 0;
      transition: opacity 0.08s;
    }
    #flash.pop { opacity: 0.6; }
  </style>
</head>
<body>

<div class="sun"></div>

<!-- Animated waves -->
<div class="waves">
  <svg class="wave-svg" viewBox="0 0 2880 130" preserveAspectRatio="none">
    <path d="M0,65 C360,130 720,0 1080,65 C1440,130 1800,0 2160,65 C2520,130 2700,30 2880,65 L2880,130 L0,130 Z"/>
  </svg>
  <svg class="wave-svg" viewBox="0 0 2880 130" preserveAspectRatio="none">
    <path d="M0,90 C480,20 960,120 1440,80 C1920,40 2400,110 2880,90 L2880,130 L0,130 Z"/>
  </svg>
  <svg class="wave-svg" viewBox="0 0 2880 130" preserveAspectRatio="none">
    <path d="M0,50 C600,100 1200,10 1800,60 C2400,110 2640,40 2880,50 L2880,130 L0,130 Z"/>
  </svg>
</div>

<div id="confetti"></div>
<div id="flash"></div>

<div class="container">
  <header>
    <div class="logo">🏄 Beach Boys 🏃</div>
    <div class="subtitle">Track Workout Roulette</div>
  </header>

  <div class="slot-wrapper">
    <div class="slot-machine">
      <div class="slot-highlight"></div>
      <div class="slot-reel" id="slotReel"></div>
    </div>
  </div>

  <button class="spin-btn" id="spinBtn">🎲 Spin the Wheel</button>

  <div class="workout-card" id="workoutCard"></div>

  <div class="history" id="history"></div>
</div>

<script>
  const WORKOUTS = [
    {
      name: "Norwegian 4×4",
      emoji: "🇳🇴",
      tag: "Elite Method",
      desc: "The legendary interval protocol behind Jakob Ingebrigtsen's dominance. Four hard laps at 5K pace with short recovery — deceptively brutal.",
      steps: [
        "Warm up: 10–15 min easy jog + drills",
        "4 × 1000m (2½ laps) at 5K race pace",
        "90 sec easy jog recovery between reps",
        "Cool down: 10 min easy jog"
      ],
      quality: "4000m",
      duration: "~50 min",
      vibe: "😤 Suffer in Nordic silence"
    },
    {
      name: "The Michigan",
      emoji: "🏫",
      tag: "College Classic",
      desc: "A descending ladder beloved by college programs everywhere. It gets shorter but you're already dying. Builds mental fortitude one rep at a time.",
      steps: [
        "Warm up: 10–15 min easy",
        "1200m @ 5K pace → 2 min rest",
        "1000m @ slightly faster → 2 min rest",
        "800m @ 3K pace → 2 min rest",
        "600m @ mile pace → 2 min rest",
        "400m — absolute death sprint",
        "Cool down: 10 min easy"
      ],
      quality: "4000m",
      duration: "~55 min",
      vibe: "📉 Gets worse every rep"
    },
    {
      name: "Yasso 800s",
      emoji: "🎯",
      tag: "Marathon Classic",
      desc: "Bart Yasso's gift to runners: if your marathon goal is 3:45, run each 800m in 3:45. Six reps today for a solid hit. The maths will haunt you.",
      steps: [
        "Warm up: 10 min easy jog",
        "6 × 800m (2 laps each)",
        "Target split (min:sec) = marathon goal (hrs:min)",
        "400m easy jog recovery between reps",
        "Cool down: 10 min easy"
      ],
      quality: "4800m",
      duration: "~55 min",
      vibe: "🧮 Marathon maths on the go"
    },
    {
      name: "The Boardwalk Burner",
      emoji: "🔥",
      tag: "Beach Boys Original",
      desc: "Short, spicy, and slightly unhinged. Ten hard 400s at mile pace with barely enough rest. Like sprinting the boardwalk to grab the last hot dog.",
      steps: [
        "Warm up: 15 min easy + 4 strides",
        "10 × 400m (1 lap) at mile race pace",
        "Jog 200m easy between reps (~90 sec)",
        "Cool down: 10 min easy"
      ],
      quality: "4000m",
      duration: "~50 min",
      vibe: "🌶️ 10 reps. No excuses."
    },
    {
      name: "The Dune Dasher",
      emoji: "🏜️",
      tag: "Beach Boys Original",
      desc: "Four grindy 1200m reps at 10K pace — like slogging through sand dunes in the heat. Builds the stubborn aerobic base you'll thank later.",
      steps: [
        "Warm up: 10–15 min easy",
        "4 × 1200m (3 laps) at 10K race pace",
        "Jog 400m easy between reps (~2 min)",
        "Cool down: 10 min easy"
      ],
      quality: "4800m",
      duration: "~55 min",
      vibe: "🐢 Slow burn, enormous gains"
    },
    {
      name: "The Sunburn Special",
      emoji: "☀️",
      tag: "Beach Boys Original",
      desc: "Sixteen 200m reps. Yes, sixteen. Like staying in the sun too long — each one seems fine until suddenly you're cooked. Stinging speed work.",
      steps: [
        "Warm up: 10 min easy + drills",
        "16 × 200m (½ lap) at 800m race pace",
        "Jog 200m easy between reps",
        "Cool down: 10 min easy"
      ],
      quality: "3200m",
      duration: "~45 min",
      vibe: "😳 16 reps. We said what we said."
    },
    {
      name: "The Bonfire Blast",
      emoji: "🪵",
      tag: "Beach Boys Original",
      desc: "Three rounds of descending pyro terror. Starts like a campfire, ends like your lungs are on fire. Short rests keep the heat cranked up.",
      steps: [
        "Warm up: 10–15 min easy",
        "3 rounds of: 800m → 400m → 200m",
        "90 sec rest between reps within a round",
        "3 min rest between rounds",
        "Cool down: 10 min easy"
      ],
      quality: "4200m",
      duration: "~55 min",
      vibe: "🔥 Three-alarm fire in your legs"
    },
    {
      name: "The Wipeout",
      emoji: "🌊",
      tag: "Beach Boys Original",
      desc: "Five brutal 600m efforts at 3K pace with full recovery between each. No hiding. Full rest means full effort every time. You have been warned.",
      steps: [
        "Warm up: 15 min easy + 4 strides",
        "5 × 600m (1½ laps) at 3K race pace",
        "Full 3 min standing rest between reps",
        "Cool down: 10 min easy"
      ],
      quality: "3000m",
      duration: "~45 min",
      vibe: "😵 Full rest = zero excuses"
    }
  ];

  const ITEM_H = 70;
  const N = WORKOUTS.length;
  const COPIES = 8;

  const reel    = document.getElementById('slotReel');
  const card    = document.getElementById('workoutCard');
  const btn     = document.getElementById('spinBtn');
  const histEl  = document.getElementById('history');
  const flashEl = document.getElementById('flash');
  const cfBox   = document.getElementById('confetti');

  let spinning = false;
  let history  = [];

  // Build reel with COPIES copies of all workouts
  function buildReel() {
    const items = Array(COPIES).fill(WORKOUTS).flat();
    reel.innerHTML = items.map(w =>
      `<div class="slot-item"><span class="ei">${w.emoji}</span>${w.name}</div>`
    ).join('');
    // Start with copy-1 item-0 centred (translateY = 35 - N*ITEM_H)
    reel.style.transition = 'none';
    reel.style.transform  = `translateY(${35 - N * ITEM_H}px)`;
  }

  function spin() {
    if (spinning) return;
    spinning = true;
    btn.disabled = true;
    btn.textContent = '⏳ Spinning…';
    card.classList.remove('show');

    const idx = Math.floor(Math.random() * N);

    // Land on this workout in copy-5 (index = N*4 + idx)
    const landAbsIdx = N * 4 + idx;
    const landY = 35 - landAbsIdx * ITEM_H;

    // Duration varies a bit each time for variety
    const dur = 2400 + Math.random() * 600;

    reel.style.transition = `transform ${dur}ms cubic-bezier(0.12, 0.82, 0.18, 1)`;
    reel.style.transform  = `translateY(${landY}px)`;

    setTimeout(() => {
      // Flash + confetti
      flashEl.classList.add('pop');
      setTimeout(() => flashEl.classList.remove('pop'), 120);
      launchConfetti();

      // Show card
      showCard(WORKOUTS[idx]);

      // Update history
      history.unshift(`${WORKOUTS[idx].emoji} ${WORKOUTS[idx].name}`);
      if (history.length > 5) history.pop();
      histEl.innerHTML = history.length > 1
        ? '📋 Previous: ' + history.slice(1).join(' → ')
        : '';

      // Silent reset to copy-1 position (same workout, visually identical)
      setTimeout(() => {
        reel.style.transition = 'none';
        const resetY = 35 - (N + idx) * ITEM_H;
        reel.style.transform = `translateY(${resetY}px)`;
      }, 400);

      spinning = false;
      btn.disabled = false;
      btn.textContent = '🎲 Spin Again';
    }, dur + 50);
  }

  function showCard(w) {
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${w.emoji} ${w.name}</div>
        <div class="tag">${w.tag}</div>
      </div>
      <p class="card-desc">${w.desc}</p>
      <ul class="steps-list">
        ${w.steps.map((s, i) => `
          <li>
            <div class="step-num">${i + 1}</div>
            <span>${s}</span>
          </li>
        `).join('')}
      </ul>
      <div class="card-footer">
        <div class="chip">📏 ${w.quality} quality</div>
        <div class="chip">⏱️ ${w.duration}</div>
        <div class="chip">💬 ${w.vibe}</div>
      </div>
    `;
    requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('show')));
  }

  function launchConfetti() {
    const colours = ['#ff6b6b','#ffd700','#4fc3f7','#67e8a0','#ff9f43','#c39bd3','#f0b27a'];
    for (let i = 0; i < 70; i++) {
      const el = document.createElement('div');
      el.className = 'cp';
      const size = 6 + Math.random() * 9;
      el.style.cssText = `
        left:${Math.random() * 100}vw;
        top:${-10 + Math.random() * -30}px;
        width:${size}px;
        height:${size}px;
        background:${colours[Math.floor(Math.random() * colours.length)]};
        border-radius:${Math.random() > 0.4 ? '50%' : '2px'};
        animation-delay:${Math.random() * 0.4}s;
        animation-duration:${1.6 + Math.random() * 1.2}s;
      `;
      cfBox.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }
  }

  // Occasional seagulls
  function spawnGull() {
    const g = document.createElement('div');
    g.className = 'seagull';
    g.textContent = Math.random() > 0.5 ? '🐦' : '🕊️';
    const top  = 5 + Math.random() * 28;
    const spd  = 9 + Math.random() * 7;
    g.style.cssText = `top:${top}vh; left:-60px; animation-duration:${spd}s;`;
    document.body.appendChild(g);
    setTimeout(() => g.remove(), spd * 1000 + 200);
  }

  btn.addEventListener('click', spin);
  buildReel();
  setTimeout(spawnGull, 1500);
  setInterval(spawnGull, 6000);
</script>
</body>
</html>
