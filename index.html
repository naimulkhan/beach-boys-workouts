<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏄 Beach Boys Track Roulette 🏃</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg,
        #1a6496 0%,
        #2e86c1 20%,
        #1abc9c 55%,
        #148f77 100%
      );
      overflow-x: hidden;
      position: relative;
    }

    /* ─── Sun ─── */
    .sun {
      position: fixed;
      top: -40px;
      right: 100px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, #fff9c4 20%, #ffe082 55%, #ffb300 100%);
      border-radius: 50%;
      box-shadow: 0 0 0 18px rgba(255,236,64,0.18), 0 0 80px 40px rgba(255,214,0,0.35);
      animation: sunPulse 4s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes sunPulse {
      from { box-shadow: 0 0 0 18px rgba(255,236,64,0.18), 0 0 80px 40px rgba(255,214,0,0.3); }
      to   { box-shadow: 0 0 0 28px rgba(255,236,64,0.22), 0 0 110px 60px rgba(255,214,0,0.45); }
    }

    /* ─── Waves ─── */
    .waves {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 130px;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }
    .wave-svg {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 100%;
    }
    .wave-svg:nth-child(1) { animation: waveScroll 7s linear infinite; fill: rgba(255,255,255,0.45); }
    .wave-svg:nth-child(2) { animation: waveScroll 11s linear infinite reverse; fill: rgba(255,255,255,0.25); bottom: 10px; }
    .wave-svg:nth-child(3) { animation: waveScroll 14s linear infinite; fill: rgba(255,255,255,0.15); bottom: 5px; }
    @keyframes waveScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ─── Seagull ─── */
    .seagull {
      position: fixed;
      font-size: 1.6rem;
      z-index: 0;
      pointer-events: none;
      animation: gullFly linear forwards;
    }
    @keyframes gullFly {
      from { transform: translateX(0); }
      to   { transform: translateX(115vw); }
    }

    /* ─── Layout ─── */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 20px 160px;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* ─── Header ─── */
    .logo {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 6vw, 3.8rem);
      color: #fff;
      text-shadow: 3px 4px 0 rgba(0,0,0,0.2), 0 0 40px rgba(255,255,255,0.3);
      margin-bottom: 6px;
      line-height: 1.1;
    }
    .subtitle {
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      color: rgba(255,255,255,0.85);
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ─── Slot Machine ─── */
    .slot-wrapper {
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 24px;
      padding: 16px;
      margin: 0 auto 28px;
      max-width: 660px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .slot-machine {
      height: 140px;
      overflow: hidden;
      border-radius: 14px;
      position: relative;
      background: rgba(0,0,0,0.4);
      border: 2px solid rgba(255,255,255,0.15);
    }

    /* top & bottom fade */
    .slot-machine::before,
    .slot-machine::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 38%;
      z-index: 10;
      pointer-events: none;
    }
    .slot-machine::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }
    .slot-machine::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    }

    /* gold highlight lines at center */
    .slot-highlight {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 0; right: 0;
      height: 72px;
      border-top: 2px solid rgba(255,214,0,0.7);
      border-bottom: 2px solid rgba(255,214,0,0.7);
      z-index: 9;
      pointer-events: none;
    }

    .slot-reel {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .slot-item {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .slot-item .ei { font-size: 1.4em; }

    /* ─── Spin Button ─── */
    .spin-btn {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #ff6b6b 0%, #ff9f43 100%);
      color: #fff;
      border: none;
      padding: 16px 56px;
      font-size: clamp(1rem, 3vw, 1.45rem);
      font-weight: 900;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 6px 24px rgba(255,107,107,0.5), 0 3px 0 #c0392b;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.2s;
      position: relative;
      overflow: hidden;
      user-select: none;
    }
    .spin-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.22), transparent 55%);
      border-radius: 50px;
    }
    .spin-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,107,107,0.6), 0 3px 0 #c0392b;
    }
    .spin-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 12px rgba(255,107,107,0.4), 0 1px 0 #c0392b;
    }
    .spin-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    /* ─── Workout Card ─── */
    .workout-card {
      background: #fff;
      border-radius: 24px;
      padding: clamp(20px, 4vw, 32px);
      margin: 28px auto 0;
      max-width: 660px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.3);
      transform: translateY(50px) scale(0.95);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity  0.4s ease;
      text-align: left;
    }
    .workout-card.show {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 900;
      color: #1a1a2e;
      line-height: 1.15;
    }
    .tag {
      display: inline-block;
      background: #e8f4fc;
      color: #1565c0;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 20px;
      white-space: nowrap;
      border: 1px solid #90caf9;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .card-desc {
      color: #555;
      font-size: 0.95rem;
      line-height: 1.65;
      margin: 12px 0 18px;
    }

    .steps-list {
      list-style: none;
      margin-bottom: 20px;
    }
    .steps-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 14px;
      margin-bottom: 7px;
      background: #f0f9ff;
      border-radius: 12px;
      border-left: 4px solid #2e86c1;
      font-size: 0.92rem;
      color: #1a1a2e;
      line-height: 1.45;
    }
    .step-num {
      background: #2e86c1;
      color: #fff;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.78rem;
      flex-shrink: 0;
    }

    .card-footer {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #fffde7;
      border: 1px solid #f9a825;
      color: #6d4c00;
      padding: 7px 13px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
    }

    /* ─── History ─── */
    .history {
      margin-top: 18px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.65);
      font-weight: 700;
      min-height: 22px;
      letter-spacing: 0.3px;
    }

    /* ─── Grim Reaper ─── */
    #grim {
      position: fixed;
      inset: 0;
      z-index: 500;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .grim-fig {
      width: min(310px, 62vw);
      opacity: 0;
      filter: drop-shadow(0 0 50px rgba(255,30,0,0.9)) drop-shadow(0 0 100px rgba(0,0,0,1));
    }
    .grim-fig.active {
      animation: grimAppear 0.95s ease forwards;
    }
    @keyframes grimAppear {
      0%   { opacity:0; transform:scale(0.05) rotate(-30deg); filter:drop-shadow(0 0 0px #000) blur(14px); }
      18%  { opacity:1; transform:scale(1.3) rotate(8deg);    filter:drop-shadow(0 0 50px rgba(255,30,0,0.95)) blur(0); }
      38%  { opacity:1; transform:scale(0.88) rotate(-4deg); }
      55%  { opacity:1; transform:scale(1.06) rotate(2deg); }
      72%  { opacity:1; transform:scale(0.97) rotate(-1deg); }
      83%  { opacity:1; transform:scale(1) rotate(0deg); }
      100% { opacity:0; transform:scale(1.5) translateY(-20px) rotate(18deg); filter:blur(6px); }
    }
    /* Screen shake applied to body */
    @keyframes screenShake {
      0%,100% { transform:translateX(0) rotate(0); }
      12%  { transform:translateX(-12px) rotate(-0.6deg); }
      25%  { transform:translateX(12px)  rotate(0.6deg); }
      37%  { transform:translateX(-8px); }
      50%  { transform:translateX(8px); }
      62%  { transform:translateX(-4px); }
      75%  { transform:translateX(4px); }
      87%  { transform:translateX(-2px); }
    }
    body.shake { animation: screenShake 0.55s ease; }
    /* Gold highlight pulse when reel pauses on fake target */
    .slot-highlight.pulse {
      animation: hlPulse 0.28s ease-in-out 3;
    }
    @keyframes hlPulse {
      0%,100% { border-color:rgba(255,214,0,0.7); }
      50%     { border-color:rgba(255,90,40,1); box-shadow:0 0 18px rgba(255,90,40,0.55); }
    }

    /* ─── Confetti ─── */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      overflow: hidden;
    }
    .cp {
      position: absolute;
      border-radius: 2px;
      animation: cfFall linear forwards;
    }
    @keyframes cfFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    /* ─── Screen flash on reveal ─── */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      pointer-events: none;
      z-index: 199;
      opacity: 0;
      transition: opacity 0.08s;
    }
    #flash.pop { opacity: 0.6; }
  </style>
</head>

  const ITEM_H = 70;
  const N = WORKOUTS.length;
  const COPIES = 8;

  const reel    = document.getElementById('slotReel');
  const card    = document.getElementById('workoutCard');
  const btn     = document.getElementById('spinBtn');
  const histEl  = document.getElementById('history');
  const flashEl = document.getElementById('flash');
  const cfBox   = document.getElementById('confetti');

  let spinning = false;
  let history  = [];

  // Build reel with COPIES copies of all workouts
  function buildReel() {
    const items = Array(COPIES).fill(WORKOUTS).flat();
    reel.innerHTML = items.map(w =>
      `<div class="slot-item"><span class="ei">${w.emoji}</span>${w.name}</div>`
    ).join('');
    // Start with copy-1 item-0 centred (translateY = 35 - N*ITEM_H)
    reel.style.transition = 'none';
    reel.style.transform  = `translateY(${35 - N * ITEM_H}px)`;
  }

  function spin() {
    if (spinning) return;
    spinning = true;
    btn.disabled = true;
    btn.textContent = '⏳ Spinning…';
    card.classList.remove('show');

    const idx        = Math.floor(Math.random() * N);
    const fakeIdx    = (idx + N - 1) % N;
    const fakeAbsIdx = N * 4 + fakeIdx;
    const fakeY      = 35 - fakeAbsIdx * ITEM_H;
    const landY      = fakeY - ITEM_H; // one item ahead = real target

    // ── Phase 1: fast spin → heavy decelerate → land on fake ──
    const phase1 = 2100 + Math.random() * 400;
    reel.style.transition = `transform ${phase1}ms cubic-bezier(0.14, 0.76, 0.08, 1)`;
    reel.style.transform  = `translateY(${fakeY}px)`;

    setTimeout(() => {
      const hl = document.querySelector('.slot-highlight');
      hl.classList.add('pulse');
      setTimeout(() => hl.classList.remove('pulse'), 840);

      const pauseMs = 440 + Math.random() * 160;
      setTimeout(() => {
        const finales = ['burst', 'reverse', 'wobble', 'scramble'];
        runFinale(finales[Math.floor(Math.random() * finales.length)]);
      }, pauseMs);
    }, phase1 + 30);

    // Bounce-settle onto landY, then call cb after afterMs
    function settle(afterMs, cb) {
      reel.style.transition = 'none';
      reel.style.transform  = `translateY(${landY - 6}px)`;
      requestAnimationFrame(() => {
        reel.style.transition = 'transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1)';
        reel.style.transform  = `translateY(${landY}px)`;
      });
      setTimeout(cb, afterMs);
    }

    function reveal() {
      setTimeout(() => {
        showGrimReaper(() => {
          flashEl.classList.add('pop');
          setTimeout(() => flashEl.classList.remove('pop'), 120);
          launchConfetti();
          showCard(WORKOUTS[idx]);

          history.unshift(`${WORKOUTS[idx].emoji} ${WORKOUTS[idx].name}`);
          if (history.length > 5) history.pop();
          histEl.innerHTML = history.length > 1
            ? '📋 Previous: ' + history.slice(1).join(' → ')
            : '';

          setTimeout(() => {
            reel.style.transition = 'none';
            reel.style.transform  = `translateY(${35 - (N + idx) * ITEM_H}px)`;
          }, 400);

          spinning = false;
          btn.disabled = false;
          btn.textContent = '🎲 Spin Again';
        });
      }, 260);
    }

    function runFinale(type) {
      switch (type) {

        case 'burst': {
          // Rockets 4 items past the target, then elastic-springs back to land on it
          reel.style.transition = 'transform 0.16s cubic-bezier(0.9, 0.1, 1, 0.5)';
          reel.style.transform  = `translateY(${fakeY - ITEM_H * 4}px)`;
          setTimeout(() => {
            reel.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
            reel.style.transform  = `translateY(${landY}px)`;
            setTimeout(reveal, 640);
          }, 180);
          break;
        }

        case 'reverse': {
          // Ticks backward one item, then shoots forward to the real target
          reel.style.transition = 'transform 0.14s ease-out';
          reel.style.transform  = `translateY(${fakeY + ITEM_H}px)`;
          setTimeout(() => {
            reel.style.transition = 'transform 0.26s cubic-bezier(0.85, 0, 1, 0.55)';
            reel.style.transform  = `translateY(${landY}px)`;
            setTimeout(() => settle(340, reveal), 280);
          }, 190);
          break;
        }

        case 'wobble': {
          // Oscillates fake → real → fake → real before settling
          const steps = [landY, fakeY, landY];
          let i = 0;
          function wobbleStep() {
            reel.style.transition = 'transform 0.12s ease-in-out';
            reel.style.transform  = `translateY(${steps[i]}px)`;
            i++;
            if (i < steps.length) setTimeout(wobbleStep, 145);
            else setTimeout(() => settle(360, reveal), 145);
          }
          wobbleStep();
          break;
        }

        case 'scramble': {
          // Center slot text spins through random workouts, then snaps to real target
          const centerEl = reel.children[fakeAbsIdx];
          let count = 0;
          const total = 16;
          const iv = setInterval(() => {
            const r = WORKOUTS[Math.floor(Math.random() * N)];
            centerEl.innerHTML = `<span class="ei">${r.emoji}</span>${r.name}`;
            if (++count >= total) {
              clearInterval(iv);
              const wf = WORKOUTS[fakeIdx];
              centerEl.innerHTML = `<span class="ei">${wf.emoji}</span>${wf.name}`;
              settle(360, reveal);
            }
          }, 45);
          break;
        }
      }
    }
  }

  function showGrimReaper(onDone) {
    const fig = document.getElementById('grimFig');
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 550);
    fig.classList.add('active');
    setTimeout(() => {
      fig.classList.remove('active');
      if (onDone) onDone();
    }, 950);
  }

  function showCard(w) {
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${w.emoji} ${w.name}</div>
        <div class="tag">${w.tag}</div>
      </div>
      <p class="card-desc">${w.desc}</p>
      <ul class="steps-list">
        ${w.steps.map((s, i) => `
          <li>
            <div class="step-num">${i + 1}</div>
            <span>${s}</span>
          </li>
        `).join('')}
      </ul>
      <div class="card-footer">
        <div class="chip">📏 ${w.quality} quality</div>
        <div class="chip">⏱️ ${w.duration}</div>
        <div class="chip">💬 ${w.vibe}</div>
      </div>
    `;
    requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('show')));
  }

  function launchConfetti() {
    const colours = ['#ff6b6b','#ffd700','#4fc3f7','#67e8a0','#ff9f43','#c39bd3','#f0b27a'];
    for (let i = 0; i < 70; i++) {
      const el = document.createElement('div');
      el.className = 'cp';
      const size = 6 + Math.random() * 9;
      el.style.cssText = `
        left:${Math.random() * 100}vw;
        top:${-10 + Math.random() * -30}px;
        width:${size}px;
        height:${size}px;
        background:${colours[Math.floor(Math.random() * colours.length)]};
        border-radius:${Math.random() > 0.4 ? '50%' : '2px'};
        animation-delay:${Math.random() * 0.4}s;
        animation-duration:${1.6 + Math.random() * 1.2}s;
      `;
      cfBox.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }
  }

  // Occasional seagulls
  function spawnGull() {
    const g = document.createElement('div');
    g.className = 'seagull';
    g.textContent = Math.random() > 0.5 ? '🐦' : '🕊️';
    const top  = 5 + Math.random() * 28;
    const spd  = 9 + Math.random() * 7;
    g.style.cssText = `top:${top}vh; left:-60px; animation-duration:${spd}s;`;
    document.body.appendChild(g);
    setTimeout(() => g.remove(), spd * 1000 + 200);
  }

  btn.addEventListener('click', spin);
  buildReel();
  setTimeout(spawnGull, 1500);
  setInterval(spawnGull, 6000);
</script>
